<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  body {
    display: flex;
    gap: 20px;
    padding: 50px;
    background-color: #f4f4f0;
  }
  /* 给 SVG 加上同样的硬阴影效果 */
  .neo-svg {
    filter: drop-shadow(6px 6px 0px #000);
    transition: transform 0.2s;
  }
  .neo-svg:hover {
    transform: translateY(-5px);
  }
</style>
</head>
<body>

  <svg class="neo-svg" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="50" fill="#ff6b6b" stroke="#000" stroke-width="5" />
    <ellipse cx="45" cy="55" rx="8" ry="12" fill="#fff" stroke="#000" stroke-width="3" />
    <circle cx="45" cy="58" r="4" fill="#000" />
    <ellipse cx="75" cy="55" rx="8" ry="12" fill="#fff" stroke="#000" stroke-width="3" />
    <circle cx="75" cy="58" r="4" fill="#000" />
    <path d="M 38 35 Q 45 30 52 35" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 68 35 Q 75 30 82 35" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <svg class="neo-svg" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="10" width="100" height="100" rx="4" fill="#74a2d6" stroke="#000" stroke-width="5" />
    <ellipse cx="45" cy="45" rx="8" ry="12" fill="#fff" stroke="#000" stroke-width="3" />
    <circle cx="48" cy="42" r="4" fill="#000" /> <ellipse cx="75" cy="45" rx="8" ry="12" fill="#fff" stroke="#000" stroke-width="3" />
    <circle cx="78" cy="42" r="4" fill="#000" />
    <path d="M 40 25 L 50 30" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 70 30 L 80 25" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <svg class="neo-svg" width="150" height="120" viewBox="0 0 150 120" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="35" width="130" height="50" fill="#5c9e42" stroke="#000" stroke-width="5" />
    <ellipse cx="50" cy="60" rx="7" ry="10" fill="#fff" stroke="#000" stroke-width="3" />
    <circle cx="50" cy="60" r="3.5" fill="#000" />
    <ellipse cx="100" cy="60" rx="7" ry="10" fill="#fff" stroke="#000" stroke-width="3" />
    <circle cx="100" cy="60" r="3.5" fill="#000" />
  </svg>

</body>
</html>
